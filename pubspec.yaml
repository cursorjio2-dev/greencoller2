name: greencollar
description: "A new Flutter project."
publish_to: 'none'  # Remove this line if you wish to publish to pub.dev

version: 1.0.2+3

environment:
  sdk: ">=3.5.4 <4.0.0"  # Ensure compatibility with Dart SDK

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2  # Use the latest version instead of 'any'
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  image_picker: ^1.1.2
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  shared_preferences: ^2.3.4
  fluttertoast: ^8.2.10
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0+3
  google_fonts: ^6.2.1
  flutter_gen: ^5.9.0
  translator: ^1.0.3+1
  permission_handler: ^11.4.0
  webview_flutter: ^4.0.0 # Or the latest version
  flutter_inappwebview: ^6.1.5
  phonepe_payment_sdk: ^2.0.3
  connectivity_plus: ^6.1.3
  http: ^1.2.2
  pinput: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/

flutter_gen:
  output: lib/gen/  # Ensures generated files go to a predictable place

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app.png"
  adaptive_icon: true
