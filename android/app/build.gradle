plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.apstia.greencollar"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.apstia.greencollar"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

     signingConfigs {
        release {
            keyAlias "key"  // The alias you chose when creating the keystore
            keyPassword "greencollar"  // Replace with your key password
            storeFile file("greencollar.jks")  // Path to the keystore
            storePassword "greencollar"  // Replace with your keystore password
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release  // Use release signing config here
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}
